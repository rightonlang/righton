name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    name: Build and test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true

      - name: Cache Cargo registry, git index, and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install LLVM 20.1 on Linux and Windows
        if: runner.os != 'macOS'
        uses: ZhongRuoyu/setup-llvm@v0
        with:
          llvm-version: "20"

      - name: Install libxml2 on Windows
        if: runner.os == 'windows'
        run: |
          vcpkg install libxml2[iconv,zlib]:x64-windows-static
          vcpkg integrate install
          vcpkg list
                
      - name: Export vcpkg environment variables
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "LIB=$VCPKG_ROOT/installed/x64-windows-static/lib;$LIB" >> $GITHUB_ENV
          echo "LIBPATH=$VCPKG_ROOT/installed/x64-windows-static/lib;$LIBPATH" >> $GITHUB_ENV
          echo "LIB=$VCPKG_ROOT/installed/x64-windows-static/debug/lib;$LIB" >> $GITHUB_ENV
          echo "LIBPATH=$VCPKG_ROOT/installed/x64-windows-static/debug/lib;$LIBPATH" >> $GITHUB_ENV
          echo "INCLUDE=$VCPKG_ROOT/installed/x64-windows-static/include;$INCLUDE" >> $GITHUB_ENV
          # Добавьте это:
          echo "RUSTFLAGS=-L native=$VCPKG_ROOT/installed/x64-windows-static/lib" >> $GITHUB_ENV
          echo "RUSTFLAGS=-L native=$VCPKG_ROOT/installed/x64-windows-static/debug/lib" >> $GITHUB_ENV
          ls $VCPKG_ROOT/installed/x64-windows-static/debug/lib/
          ls $VCPKG_ROOT/installed/x64-windows-static/lib/
          cp $VCPKG_ROOT/installed/x64-windows-static/lib/libxml2.lib $VCPKG_ROOT/installed/x64-windows-static/lib/libxml2s.lib
          cp $VCPKG_ROOT/installed/x64-windows-static/debug/lib/libxml2.lib $VCPKG_ROOT/installed/x64-windows-static/debug/lib/libxml2s.lib

          
      - name: Install LLVM 20.1 on macOS
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install llvm@20
          echo "PATH=$(brew --prefix llvm@20)/bin:$PATH" >> $GITHUB_ENV
          echo "LLVM_SYS_201_PREFIX=$(brew --prefix llvm@20)" >> $GITHUB_ENV

      - name: Build on macOS
        if: runner.os == 'macOS'
        env:
          LLVM_SYS_201_PREFIX: ${{ env.LLVM_SYS_201_PREFIX }}
        run: cargo build --verbose

      - name: Build on non-macOS
        if: runner.os != 'macOS'
        run: cargo build --verbose

      - name: Run tests on macOS
        if: runner.os == 'macOS'
        env:
          LLVM_SYS_201_PREFIX: ${{ env.LLVM_SYS_201_PREFIX }}
        run: cargo test --verbose

      - name: Run tests on non-macOS
        if: runner.os != 'macOS'
        run: cargo test --verbose

      - name: Upload compiler artifact
        uses: actions/upload-artifact@v4
        with:
          name: righton-${{ matrix.os }}
          path: target/debug/righton*

      - name: Upload LSP artifact
        uses: actions/upload-artifact@v4
        with:
          name: righton-lsp-${{ matrix.os }}
          path: target/debug/righton-lsp*
